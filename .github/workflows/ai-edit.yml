name: AI Site Edit

on:
  workflow_dispatch:
    inputs:
      chapter_slug:
        description: "Chapter slug (e.g., nigeria, usa)"
        required: true
        type: string
      prompt_text:
        description: "Natural language edit instruction"
        required: true
        type: string
      branch_name:
        description: "Branch to commit changes to"
        required: true
        type: string
      deployment_id:
        description: "Supabase deployment record ID for status updates"
        required: true
        type: string

permissions:
  contents: write

jobs:
  ai-edit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout existing branch
        run: |
          git fetch origin "${{ inputs.branch_name }}"
          git checkout "${{ inputs.branch_name }}"

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Update deployment status to building
        run: |
          curl -s -X PATCH \
            "${{ env.SUPABASE_URL }}/rest/v1/deployments?id=eq.${{ inputs.deployment_id }}" \
            -H "apikey: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "building"}'

      - name: Validate chapter folder exists
        run: |
          CHAPTER_DIR="apps/chapter-${{ inputs.chapter_slug }}"
          if [ ! -d "$CHAPTER_DIR" ]; then
            echo "Error: Chapter folder $CHAPTER_DIR does not exist"
            exit 1
          fi

      - name: Write OpenCode config
        run: |
          cat > "apps/chapter-${{ inputs.chapter_slug }}/opencode.json" << 'EOF'
          {
            "model": "google/gemini-3-flash-preview",
            "permission": {
              "read": "allow",
              "write": "allow",
              "edit": "allow",
              "bash": "deny"
            }
          }
          EOF

      - name: Run AI edit on chapter folder
        run: |
          FULL_PROMPT="${{ inputs.prompt_text }}

          CONSTRAINTS — follow these exactly:
          - Your working directory is the chapter folder for: ${{ inputs.chapter_slug }}
          - You MAY read and write any files within this directory
          - You MAY read files in ../../packages/template-core/ for reference (shared components, layouts, utilities)
          - You must NOT write, create, or delete any files in packages/template-core/ or anywhere outside your working directory
          - When importing shared components, use the @repo/template-core alias"

          cd "apps/chapter-${{ inputs.chapter_slug }}"
          opencode run "$FULL_PROMPT"

      - name: Remove temporary OpenCode config
        if: always()
        run: rm -f "apps/chapter-${{ inputs.chapter_slug }}/opencode.json"

      - name: Enforce path scope — block out-of-scope writes
        run: |
          CHAPTER_DIR="apps/chapter-${{ inputs.chapter_slug }}"
          VIOLATIONS=$(git diff --name-only HEAD | grep -v "^${CHAPTER_DIR}/" || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "SECURITY VIOLATION: AI wrote outside the allowed chapter directory:"
            echo "$VIOLATIONS"
            echo "---"
            echo "Resetting all changes and aborting."
            git checkout -- .
            git clean -fd
            exit 1
          fi

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "WIAL AI Editor"
          git config user.email "ai-editor@wial.ashwanthbk.com"
          git add -- "apps/chapter-${{ inputs.chapter_slug }}"
          git commit -m "AI edit: ${{ inputs.prompt_text }}"
          git push origin "${{ inputs.branch_name }}"

      - name: Construct preview URL
        if: steps.changes.outputs.has_changes == 'true'
        id: preview
        run: |
          BRANCH_SLUG=$(echo "${{ inputs.branch_name }}" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]' | head -c 28)
          PREVIEW_URL="https://${BRANCH_SLUG}.wial-${{ inputs.chapter_slug }}.pages.dev"
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Update deployment with preview URL
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          curl -s -X PATCH \
            "${{ env.SUPABASE_URL }}/rest/v1/deployments?id=eq.${{ inputs.deployment_id }}" \
            -H "apikey: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\": \"deploying\", \"preview_url\": \"${{ steps.preview.outputs.preview_url }}\", \"approval_status\": \"pending\", \"commit_reference\": \"${{ inputs.branch_name }}\"}"

      - name: Update deployment on no changes
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          curl -s -X PATCH \
            "${{ env.SUPABASE_URL }}/rest/v1/deployments?id=eq.${{ inputs.deployment_id }}" \
            -H "apikey: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "done", "error_message": "AI produced no file changes for this prompt.", "completed_at": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'

      - name: Update deployment on failure
        if: failure()
        run: |
          curl -s -X PATCH \
            "${{ env.SUPABASE_URL }}/rest/v1/deployments?id=eq.${{ inputs.deployment_id }}" \
            -H "apikey: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "failed", "error_message": "AI edit workflow failed. Check GitHub Actions logs.", "completed_at": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'
