name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Resolve project ref
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::Missing required secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          if [ -n "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "Using SUPABASE_PROJECT_REF from secrets."
            exit 0
          fi

          SUPABASE_HOST_URL="${SUPABASE_URL:-${PUBLIC_SUPABASE_URL:-}}"
          if [ -z "${SUPABASE_HOST_URL}" ]; then
            echo "::error::Set SUPABASE_PROJECT_REF or SUPABASE_URL/PUBLIC_SUPABASE_URL in GitHub secrets."
            exit 1
          fi

          PROJECT_REF="$(echo "${SUPABASE_HOST_URL}" | sed -E 's#https?://([^.]+)\.supabase\.co.*#\1#')"
          if [ -z "${PROJECT_REF}" ] || [ "${PROJECT_REF}" = "${SUPABASE_HOST_URL}" ]; then
            echo "::error::Could not parse project ref from ${SUPABASE_HOST_URL}."
            exit 1
          fi

          echo "SUPABASE_PROJECT_REF=${PROJECT_REF}" >> "${GITHUB_ENV}"
          echo "Resolved project ref from URL."

      - name: Deploy all edge functions
        run: |
          set -euo pipefail

          PUBLIC_FUNCTIONS=(
            contact-form
            find-coach-match
            newsletter-subscribe
            semantic-search
            stripe-connect-webhook
          )
          PROTECTED_FUNCTIONS=(
            provision-chapter
            send-invitation
          )

          is_public_function() {
            local function_name="$1"
            for public_name in "${PUBLIC_FUNCTIONS[@]}"; do
              if [ "${public_name}" = "${function_name}" ]; then
                return 0
              fi
            done
            return 1
          }

          is_protected_function() {
            local function_name="$1"
            for protected_name in "${PROTECTED_FUNCTIONS[@]}"; do
              if [ "${protected_name}" = "${function_name}" ]; then
                return 0
              fi
            done
            return 1
          }

          mapfile -t FUNCTIONS < <(find supabase/functions -mindepth 1 -maxdepth 1 -type d ! -name "_shared" -printf "%f\n" | sort)
          if [ "${#FUNCTIONS[@]}" -eq 0 ]; then
            echo "::error::No functions found in supabase/functions"
            exit 1
          fi

          # Guard against accidentally deploying protected functions without JWT verification.
          for protected_name in "${PROTECTED_FUNCTIONS[@]}"; do
            if is_public_function "${protected_name}"; then
              echo "::error::${protected_name} cannot be listed as a public function."
              exit 1
            fi
          done

          for function_name in "${FUNCTIONS[@]}"; do
            echo "Deploying ${function_name}..."
            if is_public_function "${function_name}"; then
              supabase functions deploy "${function_name}" --project-ref "${SUPABASE_PROJECT_REF}" --no-verify-jwt
            else
              supabase functions deploy "${function_name}" --project-ref "${SUPABASE_PROJECT_REF}"
            fi
          done

          echo "All edge functions deployed."
