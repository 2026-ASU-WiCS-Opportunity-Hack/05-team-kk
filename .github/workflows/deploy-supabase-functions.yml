name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Resolve project ref
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::Missing required secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          if [ -n "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "Using SUPABASE_PROJECT_REF from secrets."
            exit 0
          fi

          SUPABASE_HOST_URL="${SUPABASE_URL:-${PUBLIC_SUPABASE_URL:-}}"
          if [ -z "${SUPABASE_HOST_URL}" ]; then
            echo "::error::Set SUPABASE_PROJECT_REF or SUPABASE_URL/PUBLIC_SUPABASE_URL in GitHub secrets."
            exit 1
          fi

          PROJECT_REF="$(echo "${SUPABASE_HOST_URL}" | sed -E 's#https?://([^.]+)\.supabase\.co.*#\1#')"
          if [ -z "${PROJECT_REF}" ] || [ "${PROJECT_REF}" = "${SUPABASE_HOST_URL}" ]; then
            echo "::error::Could not parse project ref from ${SUPABASE_HOST_URL}."
            exit 1
          fi

          echo "SUPABASE_PROJECT_REF=${PROJECT_REF}" >> "${GITHUB_ENV}"
          echo "Resolved project ref from URL."

      - name: Deploy all edge functions
        run: |
          set -euo pipefail

          mapfile -t FUNCTIONS < <(find supabase/functions -mindepth 1 -maxdepth 1 -type d ! -name "_shared" -printf "%f\n" | sort)
          if [ "${#FUNCTIONS[@]}" -eq 0 ]; then
            echo "::error::No functions found in supabase/functions"
            exit 1
          fi

          for function_name in "${FUNCTIONS[@]}"; do
            echo "Deploying ${function_name}..."
            supabase functions deploy "${function_name}" --project-ref "${SUPABASE_PROJECT_REF}"
          done

          echo "All edge functions deployed."
